<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onelots — Downloads{% if current_path %} · {{ current_path }}{% endif %}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/static/onelots.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Theme -->
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="ROM downloads — EvolutionX & LineageOS builds by Onelots.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Onelots — Downloads{% if current_path %} · {{ current_path }}{% endif %}">
  <meta property="og:description" content="ROM downloads — EvolutionX & LineageOS builds by Onelots.">
  <meta property="og:image" content="https://github.com/onelots.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Onelots — Downloads">
  <meta name="twitter:description" content="ROM downloads — EvolutionX & LineageOS builds by Onelots.">
  <meta name="twitter:image" content="https://github.com/onelots.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="nprogress"></div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-msg" id="loading-msg">Loading…</div>
  </div>

  <header>
    <a href="/" class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
      </svg>
      Onelots - Builds download
    </a>
  </header>
  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <script>
    const bar = document.getElementById('nprogress');
    const overlay = document.getElementById('loading-overlay');
    const loadingMsg = document.getElementById('loading-msg');
    const DELAY_MS = 150; // don't show for fast loads
    let timer = null;

    function showLoading(msg) {
      // Start the top progress bar immediately
      bar.className = 'running';
      // Show the overlay only if the response takes > DELAY_MS
      timer = setTimeout(() => {
        loadingMsg.textContent = msg || 'Loading…';
        overlay.classList.add('visible');
      }, DELAY_MS);
    }

    function hideLoading() {
      clearTimeout(timer);
      bar.className = 'done';
      overlay.classList.remove('visible');
      setTimeout(() => { bar.className = ''; }, 500);
    }

    // Intercept all same-origin link clicks (skip download links, anchors, external)
    document.addEventListener('click', e => {
      const a = e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.startsWith('#') || a.target === '_blank') return;
      try {
        const url = new URL(href, location.href);
        if (url.origin !== location.origin) return;
      } catch { return; }
      // Skip download route — browser handles that
      if (href.includes('/download/')) return;
      showLoading('Loading…');
    });

    // Intercept search form submit
    document.addEventListener('submit', e => {
      const form = e.target.closest('form');
      if (!form) return;
      const input = form.querySelector('input[name="search"]');
      const val = input ? input.value.trim() : '';
      const msg = val ? `Searching for "${val}"…` : 'Loading…';
      showLoading(msg);
      // Put the search button into loading state
      const btn = form.querySelector('button[type="submit"]');
      if (btn) {
        btn.classList.add('loading');
        const icon = btn.querySelector('svg');
        if (icon) icon.classList.add('btn-icon');
        const sp = document.createElement('span');
        sp.className = 'btn-spinner';
        btn.prepend(sp);
      }
    });

    // Hide as soon as the new page starts painting (pageshow covers back/forward too)
    window.addEventListener('pageshow', hideLoading);
    // Safety net — hide if somehow already loaded
    if (document.readyState === 'complete') hideLoading();
    else window.addEventListener('load', hideLoading);

    // Copy S3 path buttons
    document.addEventListener('click', e => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const path = btn.dataset.s3path;
      navigator.clipboard.writeText(path).then(() => {
        const iconCopy  = btn.querySelector('.icon-copy');
        const iconCheck = btn.querySelector('.icon-check');
        iconCopy.style.display  = 'none';
        iconCheck.style.display = '';
        btn.classList.add('copied');
        btn.title = 'Copied!';
        setTimeout(() => {
          iconCopy.style.display  = '';
          iconCheck.style.display = 'none';
          btn.classList.remove('copied');
          btn.title = 'Copy S3 path';
        }, 1500);
      });
    });
  </script>
</body>
</html>
